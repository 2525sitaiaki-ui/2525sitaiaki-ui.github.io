<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サブスクリプション解約 ― 実験プロトタイプ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
      background: #eef0f5;
      min-height: 100vh;
    }

    #exp-bar {
      background: #12122a;
      color: #c8cde4;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 13px;
      border-bottom: 2px solid #1e1e50;
    }
    #exp-bar .title {
      font-weight: 700;
      color: #7b8cf7;
      font-size: 13px;
      margin-right: 4px;
      white-space: nowrap;
    }
    .cond-btn {
      padding: 5px 14px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      transition: all .2s;
      opacity: .45;
    }
    .cond-btn.ctrl  { background: #3b82f6; color: #fff; }
    .cond-btn.dark  { background: #a855f7; color: #fff; }
    .cond-btn.active { opacity: 1; box-shadow: 0 0 0 3px rgba(255,255,255,.25); }
    #reset-btn {
      padding: 5px 14px;
      border: 1px solid #3a3a6a;
      border-radius: 20px;
      background: transparent;
      color: #8888aa;
      cursor: pointer;
      font-size: 12px;
    }
    #reset-btn:hover { border-color: #7b8cf7; color: #c8cde4; }
    #exp-bar .spacer { flex: 1; }

    #metrics-bar {
      background: #0a0a1a;
      color: #39d96e;
      padding: 6px 20px;
      display: flex;
      gap: 28px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .m-label { color: #445; }
    .m-val   { color: #39d96e; font-weight: 700; min-width: 90px; }
    #cond-tag {
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
    }
    #cond-tag.ctrl { background: #1d4ed8; color: #fff; }
    #cond-tag.dark { background: #7e22ce; color: #fff; }

    #stage {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 44px 16px 60px;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 6px 32px rgba(0,0,0,.12);
      max-width: 500px;
      width: 100%;
      overflow: hidden;
      animation: popIn .25s ease;
    }
    @keyframes popIn {
      from { opacity: 0; transform: translateY(14px) scale(.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .svc-head {
      padding: 28px 36px 20px;
      text-align: center;
      border-bottom: 1px solid #f0f0f0;
    }
    .logo {
      width: 56px; height: 56px;
      border-radius: 14px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 12px;
      font-size: 26px; font-weight: 900; color: #fff;
    }
    .svc-name { font-size: 20px; font-weight: 800; color: #111; }
    .svc-plan { font-size: 13px; color: #888; margin-top: 3px; }

    .card-body { padding: 24px 36px 32px; }

    .ctrl-msg { text-align: center; margin-bottom: 26px; }
    .ctrl-msg h2 { font-size: 19px; color: #222; margin-bottom: 8px; }
    .ctrl-msg p  { font-size: 13px; color: #666; line-height: 1.75; }

    .btn-cancel {
      display: block; width: 100%;
      padding: 17px;
      background: #ef4444;
      color: #fff; border: none;
      border-radius: 10px;
      font-size: 17px; font-weight: 800;
      cursor: pointer;
      transition: all .2s;
      margin-bottom: 10px;
    }
    .btn-cancel:hover {
      background: #dc2626;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(239,68,68,.4);
    }
    .btn-keep-sub {
      display: block; width: 100%;
      padding: 11px;
      background: transparent;
      color: #777; border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px; cursor: pointer;
      transition: all .2s;
    }
    .btn-keep-sub:hover { background: #f9f9f9; color: #333; border-color: #bbb; }

    .dark-banner {
      padding: 24px 36px 18px;
      text-align: center; color: #fff;
    }
    .dark-banner h2 { font-size: 19px; font-weight: 800; margin-bottom: 5px; }
    .dark-banner p  { font-size: 13px; opacity: .85; }

    .steps {
      display: flex; justify-content: center;
      gap: 7px; margin-bottom: 22px;
    }
    .step-dot {
      height: 7px; border-radius: 4px;
      background: #ddd; transition: all .3s;
      width: 7px;
    }
    .step-dot.done   { background: #a855f7; width: 7px; }
    .step-dot.active { background: #a855f7; width: 22px; }

    .benefit-list { list-style: none; margin-bottom: 22px; }
    .benefit-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 0; border-bottom: 1px solid #f5f5f5;
    }
    .b-icon {
      width: 38px; height: 38px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 19px; flex-shrink: 0;
    }
    .b-icon.red    { background: #fef2f2; }
    .b-icon.orange { background: #fff7ed; }
    .b-icon.blue   { background: #eff6ff; }
    .b-icon.green  { background: #f0fdf4; }
    .b-icon.purple { background: #faf5ff; }
    .b-text strong { display: block; font-size: 13px; color: #222; }
    .b-text span   { font-size: 12px; color: #999; }

    .btn-keep-dark {
      display: block; width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #059669, #34d399);
      color: #fff; border: none; border-radius: 10px;
      font-size: 16px; font-weight: 800;
      cursor: pointer;
      transition: all .2s;
      box-shadow: 0 5px 18px rgba(5,150,105,.38);
      margin-bottom: 11px;
    }
    .btn-keep-dark:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(5,150,105,.48);
    }
    .btn-cancel-dark {
      display: block; width: 100%;
      padding: 10px;
      background: transparent; color: #bbb;
      border: none; border-radius: 6px;
      font-size: 12px; cursor: pointer;
      text-decoration: underline; text-underline-offset: 2px;
      transition: color .2s;
    }
    .btn-cancel-dark:hover { color: #888; }

    .loss-box {
      background: #fff5f5; border: 1px solid #fecaca;
      border-radius: 10px; padding: 14px;
      text-align: center; margin-bottom: 16px;
    }
    .loss-box .big-num { font-size: 30px; font-weight: 900; color: #dc2626; }
    .loss-box .sub     { font-size: 12px; color: #888; margin-top: 3px; }

    .loss-summary {
      background: #fffbeb; border: 1px solid #fde68a;
      border-radius: 10px; padding: 14px 16px;
      margin-bottom: 18px;
    }
    .loss-summary h3 {
      font-size: 12px; color: #d97706;
      text-transform: uppercase; letter-spacing: .5px;
      margin-bottom: 10px;
    }
    .loss-row {
      display: flex; align-items: center;
      gap: 8px; font-size: 13px; color: #555;
      margin-bottom: 5px;
    }
    .loss-row::before { content: '✕'; color: #ef4444; font-weight: 800; font-size: 11px; }

    .btn-final-cancel {
      display: block; width: 100%;
      padding: 13px 10px;
      background: transparent; color: #c0c0c0;
      border: none; border-radius: 6px;
      font-size: 11px; cursor: pointer;
      transition: color .2s;
      line-height: 1.4;
    }
    .btn-final-cancel:hover { color: #999; }

    #result-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(5px);
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
    }
    #result-overlay.hidden { display: none; }
    .result-card {
      background: #fff;
      border-radius: 18px;
      padding: 36px 40px;
      max-width: 420px; width: 90%;
      box-shadow: 0 24px 64px rgba(0,0,0,.28);
      animation: popIn .25s ease;
    }
    .result-card h2 {
      font-size: 20px; font-weight: 800;
      text-align: center; margin-bottom: 22px;
      color: #111;
    }
    .r-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 11px 0; border-bottom: 1px solid #f0f0f0;
      font-size: 14px;
    }
    .r-row:last-of-type { border-bottom: none; }
    .r-label { color: #777; }
    .r-val   { font-weight: 800; color: #111; }
    .r-val.cancel   { color: #ef4444; }
    .r-val.continue { color: #059669; }

    .badge {
      display: inline-block; padding: 3px 10px;
      border-radius: 20px; font-size: 11px; font-weight: 700;
    }
    .badge.ctrl { background: #dbeafe; color: #1d4ed8; }
    .badge.dark { background: #ede9fe; color: #6d28d9; }

    .btn-restart {
      display: block; width: 100%;
      padding: 13px; margin-top: 22px;
      background: #12122a; color: #fff;
      border: none; border-radius: 8px;
      font-size: 14px; font-weight: 700;
      cursor: pointer; transition: background .2s;
    }
    .btn-restart:hover { background: #1e1e50; }
  </style>
</head>
<body>

<div id="exp-bar">
  <span class="title">🔬 実験プロトタイプ ― サブスクリプション解約UI</span>
  <span class="spacer"></span>
  <span style="font-size:12px;color:#556;">条件切替：</span>
  <button class="cond-btn ctrl active" onclick="setCondition('ctrl')">▶ コントロール群（誠実なUI）</button>
  <button class="cond-btn dark"        onclick="setCondition('dark')">▶ 実験群（ダークパターンUI）</button>
  <button id="reset-btn"               onclick="resetExperiment()">↺ リセット</button>
</div>

<div id="metrics-bar">
  <span class="m-label">条件：</span><span id="cond-tag" class="ctrl">コントロール</span>
  <span class="m-label">経過時間：</span><span class="m-val" id="m-time">0 ms</span>
  <span class="m-label">マウス移動：</span><span class="m-val" id="m-mouse">0 px</span>
  <span class="m-label">ステップ：</span><span class="m-val" id="m-step">— / —</span>
</div>

<div id="stage"></div>

<div id="result-overlay" class="hidden">
  <div class="result-card">
    <h2>📊 実験結果</h2>
    <div class="r-row"><span class="r-label">適用条件</span>   <span class="r-val" id="r-cond">—</span></div>
    <div class="r-row"><span class="r-label">最終選択</span>   <span class="r-val" id="r-dec">—</span></div>
    <div class="r-row"><span class="r-label">所要時間</span>   <span class="r-val" id="r-time">—</span></div>
    <div class="r-row"><span class="r-label">マウス移動距離</span><span class="r-val" id="r-mouse">—</span></div>
    <div class="r-row" id="r-steps-row"><span class="r-label">通過画面数</span><span class="r-val" id="r-steps">—</span></div>
    <button class="btn-restart" onclick="resetExperiment()">↺ もう一度試す</button>
  </div>
</div>

<script>
  let condition   = 'ctrl';
  let currentStep = 0;
  let startTime   = null;
  let timerID     = null;
  let active      = false;
  let mouseDist   = 0;
  let lastX = null, lastY = null;

  document.addEventListener('mousemove', e => {
    if (!active) return;
    if (lastX !== null) {
      const dx = e.clientX - lastX, dy = e.clientY - lastY;
      mouseDist += Math.sqrt(dx*dx + dy*dy);
      document.getElementById('m-mouse').textContent = Math.round(mouseDist).toLocaleString() + ' px';
    }
    lastX = e.clientX; lastY = e.clientY;
  });

  function startTimer() {
    startTime = Date.now();
    active = true; lastX = null; lastY = null; mouseDist = 0;
    document.getElementById('m-mouse').textContent = '0 px';
    timerID = setInterval(() => {
      document.getElementById('m-time').textContent =
        (Date.now() - startTime).toLocaleString() + ' ms';
    }, 50);
  }

  function stopTimer() {
    active = false;
    clearInterval(timerID);
  }

  function setCondition(c) {
    condition = c;
    document.querySelectorAll('.cond-btn').forEach(b =>
      b.classList.toggle('active', b.classList.contains(c))
    );
    const tag = document.getElementById('cond-tag');
    if (c === 'ctrl') { tag.className = 'ctrl'; tag.textContent = 'コントロール'; }
    else              { tag.className = 'dark'; tag.textContent = 'ダークパターン'; }
    resetExperiment();
  }

  function resetExperiment() {
    stopTimer(); currentStep = 0;
    document.getElementById('m-time').textContent  = '0 ms';
    document.getElementById('m-mouse').textContent = '0 px';
    document.getElementById('result-overlay').classList.add('hidden');
    render();
    startTimer();
  }

  function decide(action) {
    stopTimer();
    const elapsed = Date.now() - startTime;

    document.getElementById('r-cond').innerHTML =
      condition === 'ctrl'
        ? '<span class="badge ctrl">コントロール群（誠実なUI）</span>'
        : '<span class="badge dark">実験群（ダークパターンUI）</span>';

    const decEl = document.getElementById('r-dec');
    decEl.textContent = action === 'cancel' ? '解約した' : '継続した';
    decEl.className = 'r-val ' + action;

    document.getElementById('r-time').textContent =
      elapsed.toLocaleString() + ' ms（' + (elapsed/1000).toFixed(2) + ' 秒）';
    document.getElementById('r-mouse').textContent =
      Math.round(mouseDist).toLocaleString() + ' px';

    const stepsRow = document.getElementById('r-steps-row');
    if (condition === 'dark') {
      stepsRow.style.display = '';
      document.getElementById('r-steps').textContent =
        (currentStep + 1) + ' 画面／3 画面';
    } else {
      stepsRow.style.display = 'none';
    }

    document.getElementById('result-overlay').classList.remove('hidden');
  }

  function nextStep() {
    currentStep++;
    render();
  }

  function render() {
    const stage = document.getElementById('stage');
    if (condition === 'ctrl') renderControl(stage);
    else                      renderDark(stage, currentStep);
  }

  function renderControl(stage) {
    document.getElementById('m-step').textContent = '1 / 1';
    stage.innerHTML = `
      <div class="card">
        <div class="svc-head">
          <div class="logo">P</div>
          <div class="svc-name">PremiumPlus</div>
          <div class="svc-plan">プレミアムプラン &nbsp;·&nbsp; ¥980 / 月</div>
        </div>
        <div class="card-body">
          <div class="ctrl-msg">
            <h2>サブスクリプションの解約</h2>
            <p>
              解約すると、現在の請求期間（2026年3月31日）まで<br>
              引き続きサービスをご利用いただけます。<br>
              いつでも再加入可能です。
            </p>
          </div>
          <button class="btn-cancel" onclick="decide('cancel')">解約する</button>
          <button class="btn-keep-sub" onclick="decide('continue')">解約せず続ける</button>
        </div>
      </div>`;
  }

  function dots(active) {
    return [0,1,2].map(i =>
      `<div class="step-dot ${i < active ? 'done' : i === active ? 'active' : ''}"></div>`
    ).join('');
  }

  function renderDark(stage, step) {
    if (step === 0) {
      document.getElementById('m-step').textContent = '1 / 3';
      stage.innerHTML = `
        <div class="card">
          <div class="dark-banner" style="background:linear-gradient(135deg,#2e1065,#4c1d95);">
            <h2>⚠️ 解約前にご確認ください</h2>
            <p>本当に解約してよろしいですか？</p>
          </div>
          <div class="card-body">
            <div class="steps">${dots(0)}</div>
            <p style="font-size:13px;color:#444;line-height:1.8;margin-bottom:16px;">
              解約すると、以下の<strong>すべての特典がただちに失われます。</strong><br>
              毎月多くのお客様にご愛顧いただいており、9割以上の方が
              解約を思いとどまっています。
            </p>
            <ul class="benefit-list">
              <li class="benefit-item">
                <div class="b-icon red">🎬</div>
                <div class="b-text"><strong>無制限の動画視聴</strong><span>10,000本以上が見放題</span></div>
              </li>
              <li class="benefit-item">
                <div class="b-icon orange">⬇️</div>
                <div class="b-text"><strong>オフラインダウンロード</strong><span>いつでもどこでも視聴可能</span></div>
              </li>
              <li class="benefit-item">
                <div class="b-icon blue">📱</div>
                <div class="b-text"><strong>マルチデバイス対応（5台）</strong><span>家族全員でシェア可能</span></div>
              </li>
            </ul>
            <button class="btn-keep-dark" onclick="decide('continue')">
              ✓ お得に使い続ける
            </button>
            <button class="btn-cancel-dark" onclick="nextStep()">
              解約手続きを続ける
            </button>
          </div>
        </div>`;

    } else if (step === 1) {
      document.getElementById('m-step').textContent = '2 / 3';
      stage.innerHTML = `
        <div class="card">
          <div class="dark-banner" style="background:linear-gradient(135deg,#78350f,#d97706);">
            <h2>😢 失ってしまうもの</h2>
            <p>解約後は、これだけの価値が消えてしまいます</p>
          </div>
          <div class="card-body">
            <div class="steps">${dots(1)}</div>
            <div class="loss-box">
              <div class="big-num">¥46,560</div>
              <div class="sub">これまでに受け取った特典の累計推定額</div>
            </div>
            <ul class="benefit-list">
              <li class="benefit-item">
                <div class="b-icon purple">👑</div>
                <div class="b-text"><strong>プレミアム会員バッジ</strong><span>解約後は即時失効 ― 再加入でも引き継ぎ不可</span></div>
              </li>
              <li class="benefit-item">
                <div class="b-icon green">🎁</div>
                <div class="b-text"><strong>来月の無料特典（予定）</strong><span>解約すると受け取れません</span></div>
              </li>
              <li class="benefit-item">
                <div class="b-icon orange">⭐</div>
                <div class="b-text"><strong>獲得済みポイント 3,200 pt</strong><span>解約後90日で自動消滅</span></div>
              </li>
              <li class="benefit-item">
                <div class="b-icon red">📚</div>
                <div class="b-text"><strong>保存リスト・視聴履歴</strong><span>アカウント削除後は完全消去</span></div>
              </li>
            </ul>
            <button class="btn-keep-dark" onclick="decide('continue')">
              ✓ やっぱり使い続ける
            </button>
            <button class="btn-cancel-dark" onclick="nextStep()">
              それでも解約する
            </button>
          </div>
        </div>`;

    } else if (step === 2) {
      document.getElementById('m-step').textContent = '3 / 3';
      stage.innerHTML = `
        <div class="card">
          <div class="dark-banner" style="background:linear-gradient(135deg,#7f1d1d,#ef4444);">
            <h2>🚨 最終確認</h2>
            <p>本当に、本当によろしいですか？</p>
          </div>
          <div class="card-body">
            <div class="steps">${dots(2)}</div>
            <div class="loss-summary">
              <h3>⚠️ 解約するとこれらすべてを失います</h3>
              <div class="loss-row">無制限の動画視聴（10,000本以上）</div>
              <div class="loss-row">オフラインダウンロード機能</div>
              <div class="loss-row">マルチデバイス視聴（5台）</div>
              <div class="loss-row">プレミアム会員バッジ（引き継ぎ不可）</div>
              <div class="loss-row">獲得済みポイント 3,200 pt（90日で消滅）</div>
              <div class="loss-row">来月の無料特典（受け取り不可）</div>
            </div>
            <p style="font-size:11px;color:#bbb;text-align:center;margin-bottom:18px;">
              ※ 解約後の再加入では、これらの特典は一切引き継がれません
            </p>
            <button class="btn-keep-dark" style="font-size:18px;padding:20px;" onclick="decide('continue')">
              🎉 お得に使い続ける
            </button>
            <button class="btn-final-cancel" onclick="decide('cancel')">
              いいえ、私は損をすることを選びます
            </button>
          </div>
        </div>`;
    }
  }

  resetExperiment();
</script>
</body>
</html>
